services:
  db:
    image: postgres:16-alpine
    container_name: modelops-postgres
    environment:
      POSTGRES_USER: modelops_user
      POSTGRES_PASSWORD: modelops_password
      POSTGRES_DB: modelops_doctor
    ports:
      - "5433:5432"
    volumes:
      - modelops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U modelops_user -d modelops_doctor",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: modelops-redis-compose
    ports:
      - "6380:6379"
    volumes:
      - modelops_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: modelops-api
    environment:
      ENVIRONMENT: docker
      DEBUG: "false"
      LOG_LEVEL: INFO
      POSTGRES_USER: modelops_user
      POSTGRES_PASSWORD: modelops_password
      POSTGRES_DB: modelops_doctor
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      STORAGE_PATH: ./storage
      CORS_ORIGINS: http://localhost:5173
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/api/v1/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: modelops-worker
    command:
      [
        "python",
        "-m",
        "celery",
        "-A",
        "app.workers.celery_app:celery_app",
        "worker",
        "--loglevel=info",
      ]
    environment:
      ENVIRONMENT: docker
      DEBUG: "false"
      LOG_LEVEL: INFO
      POSTGRES_USER: modelops_user
      POSTGRES_PASSWORD: modelops_password
      POSTGRES_DB: modelops_doctor
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_PATH: ./storage
      RUN_MIGRATIONS: "false"
    volumes:
      - ./storage:/app/storage
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: modelops-beat
    command:
      [
        "python",
        "-m",
        "celery",
        "-A",
        "app.workers.celery_app:celery_app",
        "beat",
        "--loglevel=info",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    environment:
      ENVIRONMENT: docker
      DEBUG: "false"
      LOG_LEVEL: INFO
      POSTGRES_USER: modelops_user
      POSTGRES_PASSWORD: modelops_password
      POSTGRES_DB: modelops_doctor
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_PATH: ./storage
      RUN_MIGRATIONS: "false"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: modelops-frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  modelops_postgres_data:
  modelops_redis_data: