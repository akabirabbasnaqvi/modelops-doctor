name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: modelops_user
          POSTGRES_PASSWORD: modelops_password
          POSTGRES_DB: modelops_doctor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd
          "pg_isready -U modelops_user -d modelops_doctor_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: test
      DEBUG: "false"
      LOG_LEVEL: INFO
      POSTGRES_USER: modelops_user
      POSTGRES_PASSWORD: modelops_password
      POSTGRES_DB: modelops_doctor_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CELERY_TASK_ALWAYS_EAGER: "true"
      STORAGE_PATH: ./storage
      CORS_ORIGINS: http://localhost:5173

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.docker.txt
          
      - name: Run Ruff linting
        run: |
          python -m ruff check app tests alembic/env.py

      - name: Check Ruff formatting
        run: |
          python -m ruff format --check app tests alembic/env.py

      - name: Run migrations
        run: |
          python -m alembic upgrade head

      - name: Run tests with coverage
        run: |
          python -m pytest

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t modelops-doctor-backend:test \
            .
